name: trash_sorter
description: "Trash Sorter App - Smart waste classification using ML Kit & Firebase"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3

  # ML Kit
  google_mlkit_image_labeling: ^0.12.0

  # Camera / Image
  image_picker: ^1.1.2

  # HTTP client
  http: ^1.2.2

  # Local notifications (for FCM foreground)
  flutter_local_notifications: ^17.2.2

  # Storage
  shared_preferences: ^2.3.2

  # UI helpers
  cached_network_image: ^3.4.1
  intl: ^0.19.0
  lottie: ^3.1.2

  cupertino_icons: ^1.0.8
  flutter_image_compress: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
